<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Manask</title>
        <link rel="icon" href="../img/logo_web_v2.png" type="image/png">
        <script type="module" src='../utils.js'></script>
        <link rel="stylesheet" href="../css/account/login.css" />
        <script type="module" src="../js/acconut/login.js" defer></script>
    </head>
    <body>
        <div class="container">
            <div class="logo-wrapper">
                <img class="logo" src="../img/logo_web.png" alt="Logo">
            </div>
            
            <div class="user-email">
                <label for="email-input" data-i18n="login.label.email">EMAIL</label>
                <input type="email" id="email-input" placeholder="example@email.com" class="modal-input" autocomplete="email" data-i18n-placeholder="login.placeholder.email">
            </div>
            
            <div class="user-password">
                <label for="password-input" data-i18n="login.label.password">PASSWORD</label>
                <div class="password-field">
                    <input type="password" id="password-input" placeholder="••••••••" class="modal-input" autocomplete="current-password" data-i18n-placeholder="login.placeholder.password">
                    <button type="button" class="toggle-password" tabindex="-1">
                        <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <p class="login" data-i18n="login.button.login">LOGIN</p>
            <p class="warning"></p>
            
            <a href="./signup.html">
                <span class="signup" data-i18n="login.signup.prompt">Don't have an account?</span>
                <span class="signup-btn" data-i18n="login.signup.link">Sign up now</span>
            </a>
        </div>
    </body>
</html>
