<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro - Manask</title>
  <link rel="icon" href="../img/logo_web_v2.png" type="image/png">
  <script type="module" src='../utils.js'></script>
  <link rel="stylesheet" href="../css/pomodoro.css">
  <link rel="stylesheet" href="../css/notification.css">
  <script type="module" src="../js/pomodoro.js" defer></script>
</head>
<body>

<div class="pomo-wrapper">
  <!-- Timer Panel -->
  <div class="timer-panel">

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-i18n="pomodoro.tabs.pomodoro">Pomodoro</button>
      <button class="mode-tab" data-i18n="pomodoro.tabs.shortBreak">Short Break</button>
      <button class="mode-tab" data-i18n="pomodoro.tabs.longBreak">Long Break</button>
    </div>

    <!-- Timer circle -->
    <div class="timer-circle-wrap">
      <svg class="timer-svg" viewBox="0 0 220 220">
        <circle class="timer-track" cx="110" cy="110" r="100"/>
        <circle class="timer-progress" id="timerProgress" cx="110" cy="110" r="100"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-mode-label" id="modeLabel" data-i18n="pomodoro.mode.focus">Focus</div>
        <div class="session-dots" id="sessionDots"></div>
      </div>
    </div>

    <!-- Task select -->
    <div class="task-select-wrap">
      <button class="task-trigger" id="taskTrigger">
        <span id="taskTriggerLabel" data-i18n="pomodoro.task.selectPlaceholder">— Select active task —</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <!-- Controls -->
    <div class="timer-controls">
      <button class="btn btn-icon" data-i18n-title="pomodoro.controls.reset" title="Reset">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <button class="btn btn-primary" id="startBtn">
        <svg id="startIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <span id="startLabel" data-i18n="pomodoro.controls.start">Start</span>
      </button>
      <button class="btn btn-icon" data-i18n-title="pomodoro.controls.skip" title="Skip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5,4 15,12 5,20"/>
          <line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel">
    <div class="settings-title">
      <span class="settings-title-dot"></span>
      <span data-i18n="pomodoro.settings.title">SETTINGS</span>
    </div>

    <div class="settings-section">
      <div class="settings-section-label" data-i18n="pomodoro.settings.durationLabel">Duration (minutes)</div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.tabs.pomodoro">Pomodoro</span>
        <div class="num-input-wrap">
          <button class="num-btn" data-target="focusDur" data-delta="-1">-</button>
          <input class="num-input" type="number" id="focusDur" value="25" min="1" max="90" readonly>
          <button class="num-btn" data-target="focusDur" data-delta="1">+</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.tabs.shortBreak">Short Break</span>
        <div class="num-input-wrap">
          <button class="num-btn" data-target="shortDur" data-delta="-1">-</button>
          <input class="num-input" type="number" id="shortDur" value="5" min="1" max="30" readonly>
          <button class="num-btn" data-target="shortDur" data-delta="1">+</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.tabs.longBreak">Long Break</span>
        <div class="num-input-wrap">
          <button class="num-btn" data-target="longDur" data-delta="-1">-</button>
          <input class="num-input" type="number" id="longDur" value="15" min="1" max="60" readonly>
          <button class="num-btn" data-target="longDur" data-delta="1">+</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.settings.longBreakAfter">Long Break After</span>
        <div class="num-input-wrap">
          <button class="num-btn" data-target="longAfter" data-delta="-1">-</button>
          <input class="num-input" type="number" id="longAfter" value="4" min="2" max="10" readonly>
          <button class="num-btn" data-target="longAfter" data-delta="1">+</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="settings-section">
      <div class="settings-section-label" data-i18n="pomodoro.settings.behaviorLabel">Behavior</div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.settings.disableBreaks">Disable Breaks</span>
        <label class="toggle">
          <input type="checkbox" id="disableBreak">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.settings.autoStartPomodoro">Auto-start Pomodoro</span>
        <label class="toggle">
          <input type="checkbox" id="autoFocus">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label" data-i18n="pomodoro.settings.autoStartBreaks">Auto-start Breaks</span>
        <label class="toggle">
          <input type="checkbox" id="autoBreak">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Music Section -->
    <div class="settings-section music-section">
      <div class="settings-section-label" data-i18n="pomodoro.music.label">Music</div>

      <!-- Music trigger button -->
      <button class="music-trigger" id="musicTrigger">
        <!-- Icon nhạc -->
        <svg class="music-trigger-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <span id="musicTriggerLabel" data-i18n="pomodoro.music.noneSelected">No music</span>
        <!-- Equalizer animation khi đang phát -->
        <span class="music-eq" id="musicEq" style="display:none">
          <span></span><span></span><span></span>
        </span>
        <svg class="music-trigger-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Volume control (chỉ hiện khi có track được chọn) -->
      <div class="music-volume-wrap" id="musicVolumeWrap" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--text-tertiary)">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input type="range" class="music-volume-slider" id="musicVolumeSlider" min="0" max="100" value="60">
        <span class="music-volume-label" id="musicVolumeLabel">60%</span>
      </div>
    </div>

    <button class="close-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      <span data-i18n="pomodoro.settings.close">Close Pomodoro</span>
    </button>
    <p class="warning-close" data-i18n="pomodoro.settings.closeWarning">Exit will discard current pomodoro!</p>
  </div>
</div>

<!-- Task Picker Modal -->
<div class="task-overlay" id="taskOverlay"></div>
<div class="task-modal" id="taskModal">
  <div class="task-modal-header" data-i18n="pomodoro.task.modalHeader">Select Active Task</div>

  <div class="task-search-wrap">
    <svg class="task-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      id="taskSearchInput"
      class="task-search-input"
      type="text"
      placeholder="Search tasks..."
      autocomplete="off"
      data-i18n-placeholder="pomodoro.task.searchPlaceholder"
    />
  </div>

  <div class="task-modal-list" id="taskModalList"></div>
</div>

<!-- Music Picker Modal -->
<div class="music-overlay" id="musicOverlay"></div>
<div class="music-modal" id="musicModal">
  <div class="music-modal-header">
    <span data-i18n="pomodoro.music.modalHeader">Focus Music</span>
  </div>

  <!-- Danh sách track -->
  <div class="music-modal-list" id="musicModalList"></div>

  <!-- Form thêm track mới -->
  <div class="music-add-form" id="musicAddForm" style="display:none">
    <input
      type="text"
      class="music-add-input"
      id="musicAddName"
      data-i18n-placeholder="pomodoro.music.addNamePlaceholder"
      placeholder="Track name..."
      autocomplete="off"
    />
    <input
      type="url"
      class="music-add-input"
      id="musicAddUrl"
      data-i18n-placeholder="pomodoro.music.addUrlPlaceholder"
      placeholder="Audio URL (mp3, ogg...)..."
      autocomplete="off"
    />
    <div class="music-add-actions">
      <button class="music-add-cancel" id="musicAddCancel" data-i18n="pomodoro.music.addCancel">Cancel</button>
      <button class="music-add-confirm" id="musicAddConfirm" data-i18n="pomodoro.music.addConfirm">Add</button>
    </div>
  </div>

  <!-- Footer: nút thêm track -->
  <div class="music-modal-footer">
    <button class="music-add-btn" id="musicAddBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span data-i18n="pomodoro.music.addTrack">Add track</span>
    </button>
  </div>
</div>

</body>
</html>
